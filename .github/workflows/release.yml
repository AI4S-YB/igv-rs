name: Release

# Triggered only when a GitHub Release is published. Builds platform-specific
# binaries and attaches them as release assets.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --bin igv-rs --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --bin igv-rs --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          name="igv-rs-${tag}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/igv-rs" "$name/"
          cp README.md "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
          echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=$name.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $name = "igv-rs-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/igv-rs.exe" "$name/"
          Copy-Item README.md "$name/"
          Compress-Archive -Path $name -DestinationPath "$name.zip"
          $hash = Get-FileHash -Algorithm SHA256 "$name.zip"
          "$($hash.Hash.ToLower())  $name.zip" | Out-File -Encoding ascii "$name.zip.sha256"
          "ASSET=$name.zip" | Out-File -Append -Encoding ascii $env:GITHUB_ENV
          "CHECKSUM=$name.zip.sha256" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}
